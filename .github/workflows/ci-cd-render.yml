name: CI/CD — Tests and Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, xml, ctype, json

      - name: Install system deps
        run: sudo apt-get update -y && sudo apt-get install -y git unzip

      - name: Validate composer
        run: composer --version

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare Laravel environment (generate APP_KEY)
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          php artisan key:generate --ansi --force || true
          php artisan config:clear || true

      - name: Quick PHP lint
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 -P4 php -l || true

      - name: Run PHPUnit (if present)
        run: |
          if [ -f vendor/bin/phpunit ]; then
            # Ensure .env exists
            if [ -f .env.example ] && [ ! -f .env ]; then cp .env.example .env; fi
            # Generate a base64 Laravel APP_KEY and write it to GITHUB_ENV and .env
            KEY="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
            echo "APP_KEY=$KEY" >> $GITHUB_ENV
            if [ -f .env ]; then
              if grep -q '^APP_KEY=' .env; then
                sed -i "s#^APP_KEY=.*#APP_KEY=$KEY#" .env || true
              else
                echo "APP_KEY=$KEY" >> .env
              fi
            else
              echo "APP_KEY=$KEY" > .env
            fi
            # Run phpunit with APP_KEY provided in the same process (ensures immediate availability)
            APP_KEY="$KEY" vendor/bin/phpunit --colors=always
          else
            echo 'No PHPUnit found, skipping tests'
          fi

  deploy-to-render:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq curl

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo 'RENDER_API_KEY and RENDER_SERVICE_ID must be set in repository secrets'; exit 1;
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          resp=$(curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Render response: $resp"
          deploy_id=$(echo "$resp" | jq -r .id // empty)
          if [ -z "$deploy_id" ]; then
            echo "Failed to create deploy: $resp"; exit 1;
          fi
          echo "Created deploy: $deploy_id"

          # Poll deploy status until it finishes (success or failure)
          for i in {1..30}; do
            status=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" | jq -r .state)
            echo "Deploy status: $status"
            if [ "${status}" = "succeeded" ]; then
              echo "Deploy succeeded"; exit 0
            fi
            if [ "${status}" = "failed" ]; then
              echo "Deploy failed"; exit 1
            fi
            sleep 10
          done
          echo "Deploy did not finish in time"; exit 1
