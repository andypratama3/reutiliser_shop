name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, xml, ctype, json

      - name: Validate composer
        run: composer --version

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

      - name: Basic PHP lint (quick)
        run: |
          echo 'Checking PHP syntax for project files (excluding vendor)'
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 -P4 php -l || true

      - name: Run tests if available
        run: |
          if [ -f vendor/bin/phpunit ]; then
            echo 'Running PHPUnit'
            vendor/bin/phpunit --colors=always
          else
            echo 'No PHPUnit found, skipping tests'
          fi
